<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Scale from everyday physics to quantum physics</title>
  <desc id="desc">A logarithmic scale comparing everyday objects, a grain of sand, a cell, atoms, nuclei, and quantum wavelength effects.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <style>
      .title { font: 800 34px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 500 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tick { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #475569; }
    </style>
  </defs>
  <rect width="1200" height="520" rx="34" fill="url(#panel)"/>
  <text x="70" y="72" class="title">Why quantum rules show up at tiny scales</text>
  <text x="70" y="108" class="small">Quantum effects become visible when wavelengths and system sizes are comparable.</text>

  <line x1="95" y1="275" x2="1105" y2="275" stroke="#0f172a" stroke-width="5" stroke-linecap="round"/>
  <g stroke="#64748b" stroke-width="2">
    <line x1="95" y1="252" x2="95" y2="298"/>
    <line x1="240" y1="258" x2="240" y2="292"/>
    <line x1="385" y1="258" x2="385" y2="292"/>
    <line x1="530" y1="252" x2="530" y2="298"/>
    <line x1="675" y1="258" x2="675" y2="292"/>
    <line x1="820" y1="252" x2="820" y2="298"/>
    <line x1="965" y1="258" x2="965" y2="292"/>
    <line x1="1105" y1="252" x2="1105" y2="298"/>
  </g>
  <g text-anchor="middle">
    <text x="95" y="330" class="tick">1 m</text>
    <text x="240" y="330" class="tick">10^-3 m</text>
    <text x="385" y="330" class="tick">10^-6 m</text>
    <text x="530" y="330" class="tick">10^-9 m</text>
    <text x="820" y="330" class="tick">10^-12 m</text>
    <text x="1105" y="330" class="tick">10^-15 m</text>
  </g>

  <g>
    <circle cx="95" cy="213" r="42" fill="#2563eb" opacity="0.92"/>
    <path d="M 73 214 h44 M 95 192 v44" stroke="#dbeafe" stroke-width="8" stroke-linecap="round"/>
    <text x="95" y="162" text-anchor="middle" class="label">Everyday</text>
    <text x="95" y="390" text-anchor="middle" class="small">classical</text>
  </g>

  <g>
    <circle cx="240" cy="226" r="25" fill="#f59e0b"/>
    <circle cx="230" cy="218" r="4" fill="#7c2d12"/>
    <circle cx="246" cy="233" r="4" fill="#7c2d12"/>
    <circle cx="252" cy="218" r="3" fill="#7c2d12"/>
    <text x="240" y="184" text-anchor="middle" class="label">Sand grain</text>
    <text x="240" y="390" text-anchor="middle" class="small">classical</text>
  </g>

  <g>
    <ellipse cx="385" cy="223" rx="35" ry="26" fill="#16a34a" opacity="0.86"/>
    <circle cx="390" cy="222" r="10" fill="#dcfce7"/>
    <text x="385" y="178" text-anchor="middle" class="label">Cell</text>
    <text x="385" y="390" text-anchor="middle" class="small">thermal noise</text>
  </g>

  <g>
    <circle cx="530" cy="225" r="24" fill="none" stroke="#7c3aed" stroke-width="5"/>
    <circle cx="530" cy="225" r="6" fill="#7c3aed"/>
    <ellipse cx="530" cy="225" rx="46" ry="17" fill="none" stroke="#a78bfa" stroke-width="3" transform="rotate(-24 530 225)"/>
    <text x="530" y="178" text-anchor="middle" class="label">Molecules</text>
    <text x="530" y="390" text-anchor="middle" class="small">quantization</text>
  </g>

  <g>
    <circle cx="675" cy="225" r="10" fill="#ef4444"/>
    <ellipse cx="675" cy="225" rx="62" ry="24" fill="none" stroke="#fb7185" stroke-width="4"/>
    <ellipse cx="675" cy="225" rx="62" ry="24" fill="none" stroke="#fb7185" stroke-width="4" transform="rotate(62 675 225)"/>
    <text x="675" y="178" text-anchor="middle" class="label">Atoms</text>
    <text x="675" y="390" text-anchor="middle" class="small">wavefunctions</text>
  </g>

  <g>
    <circle cx="820" cy="225" r="18" fill="#0ea5e9"/>
    <circle cx="810" cy="218" r="7" fill="#fef3c7"/>
    <circle cx="829" cy="226" r="7" fill="#fee2e2"/>
    <circle cx="816" cy="235" r="7" fill="#fef3c7"/>
    <text x="820" y="178" text-anchor="middle" class="label">Nucleus</text>
    <text x="820" y="390" text-anchor="middle" class="small">tunneling</text>
  </g>

  <path d="M 654 442 C 710 410 780 475 848 438 S 962 420 1036 452" fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
  <text x="846" y="488" text-anchor="middle" class="small">matter waves become experimentally visible</text>
</svg>
