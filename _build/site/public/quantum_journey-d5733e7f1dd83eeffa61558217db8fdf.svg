<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Quantum learning journey roadmap</title>
  <desc id="desc">A six-step roadmap from classical intuition through math, wave mechanics, qubits, entanglement, and quantum algorithms.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#f7fff9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155"/>
    </marker>
    <style>
      .label { font: 700 26px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 500 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .num { font: 800 28px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .formula { font: 650 22px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f172a; }
    </style>
  </defs>
  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <path d="M 88 225 C 210 125 300 320 420 220 S 610 125 730 220 S 930 315 1095 200" fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round" stroke-dasharray="12 14" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <g transform="translate(60 95)">
      <rect width="160" height="160" rx="28" fill="#2563eb"/>
      <circle cx="80" cy="63" r="30" fill="#bfdbfe"/>
      <path d="M 43 110 q37 -34 74 0" fill="none" stroke="#eff6ff" stroke-width="8" stroke-linecap="round"/>
      <text x="80" y="151" text-anchor="middle" class="num">1</text>
    </g>
    <g transform="translate(252 170)">
      <rect width="160" height="160" rx="28" fill="#0891b2"/>
      <text x="80" y="78" text-anchor="middle" class="formula">a+bi</text>
      <path d="M 42 108 h76 M 80 70 v76" stroke="#cffafe" stroke-width="6" stroke-linecap="round"/>
      <text x="80" y="151" text-anchor="middle" class="num">2</text>
    </g>
    <g transform="translate(444 88)">
      <rect width="160" height="160" rx="28" fill="#7c3aed"/>
      <path d="M 30 88 C 55 28 83 148 110 88 S 140 48 147 82" fill="none" stroke="#ede9fe" stroke-width="7" stroke-linecap="round"/>
      <text x="80" y="151" text-anchor="middle" class="num">3</text>
    </g>
    <g transform="translate(636 170)">
      <rect width="160" height="160" rx="28" fill="#16a34a"/>
      <circle cx="80" cy="80" r="46" fill="none" stroke="#dcfce7" stroke-width="6"/>
      <path d="M 80 80 L 116 51" stroke="#f0fdf4" stroke-width="8" stroke-linecap="round"/>
      <circle cx="80" cy="80" r="6" fill="#f0fdf4"/>
      <text x="80" y="151" text-anchor="middle" class="num">4</text>
    </g>
    <g transform="translate(828 88)">
      <rect width="160" height="160" rx="28" fill="#dc2626"/>
      <circle cx="55" cy="82" r="22" fill="#fee2e2"/>
      <circle cx="105" cy="82" r="22" fill="#fee2e2"/>
      <path d="M 72 82 C 82 58 93 58 88 82 C 83 106 98 106 105 82" fill="none" stroke="#fff1f2" stroke-width="6" stroke-linecap="round"/>
      <text x="80" y="151" text-anchor="middle" class="num">5</text>
    </g>
    <g transform="translate(1020 150)">
      <rect width="160" height="160" rx="28" fill="#f59e0b"/>
      <path d="M 40 102 h80 M 46 102 c18 -48 32 -48 52 0 c8 20 15 20 24 0" fill="none" stroke="#fffbeb" stroke-width="7" stroke-linecap="round"/>
      <circle cx="53" cy="67" r="7" fill="#fffbeb"/>
      <circle cx="83" cy="94" r="7" fill="#fffbeb"/>
      <circle cx="118" cy="55" r="7" fill="#fffbeb"/>
      <text x="80" y="151" text-anchor="middle" class="num">6</text>
    </g>
  </g>

  <g>
    <text x="140" y="305" text-anchor="middle" class="label">Classical</text>
    <text x="140" y="332" text-anchor="middle" class="small">where intuition starts</text>

    <text x="332" y="365" text-anchor="middle" class="label">Math Tools</text>
    <text x="332" y="392" text-anchor="middle" class="small">probability, complex numbers</text>

    <text x="524" y="303" text-anchor="middle" class="label">Waves</text>
    <text x="524" y="330" text-anchor="middle" class="small">states, energy, tunneling</text>

    <text x="716" y="365" text-anchor="middle" class="label">Qubits</text>
    <text x="716" y="392" text-anchor="middle" class="small">gates and measurement</text>

    <text x="908" y="303" text-anchor="middle" class="label">Entanglement</text>
    <text x="908" y="330" text-anchor="middle" class="small">shared quantum states</text>

    <text x="1088" y="345" text-anchor="middle" class="label">Algorithms</text>
    <text x="1088" y="372" text-anchor="middle" class="small">interference</text>
  </g>
</svg>
