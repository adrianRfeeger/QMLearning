<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Bell pair entanglement correlations</title>
  <desc id="desc">Two separated labs share a Bell pair. Measurements are correlated, but no faster-than-light signal is sent.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#fefce8"/>
    </linearGradient>
    <style>
      .label { font: 750 26px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .mono { font: 650 20px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #334155; }
    </style>
  </defs>
  <rect width="1100" height="560" rx="34" fill="url(#bg)"/>
  <text x="60" y="70" class="label">Entanglement: one shared state, correlated outcomes</text>
  <text x="60" y="104" class="small">A Bell pair cannot be described as two independent qubit states.</text>

  <g transform="translate(90 165)">
    <rect width="270" height="245" rx="28" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="135" y="48" text-anchor="middle" class="label">Alice</text>
    <circle cx="135" cy="114" r="38" fill="#2563eb"/>
    <path d="M 117 114 h36 M 135 96 v36" stroke="#eff6ff" stroke-width="8" stroke-linecap="round"/>
    <rect x="70" y="174" width="130" height="42" rx="21" fill="#ffffff"/>
    <text x="135" y="201" text-anchor="middle" class="mono">measure A</text>
  </g>

  <g transform="translate(740 165)">
    <rect width="270" height="245" rx="28" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="135" y="48" text-anchor="middle" class="label">Bob</text>
    <circle cx="135" cy="114" r="38" fill="#16a34a"/>
    <path d="M 117 114 h36 M 135 96 v36" stroke="#f0fdf4" stroke-width="8" stroke-linecap="round"/>
    <rect x="70" y="174" width="130" height="42" rx="21" fill="#ffffff"/>
    <text x="135" y="201" text-anchor="middle" class="mono">measure B</text>
  </g>

  <g transform="translate(430 182)">
    <rect width="240" height="170" rx="30" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="120" y="42" text-anchor="middle" class="label">Bell state</text>
    <text x="120" y="86" text-anchor="middle" class="mono">(|00&gt; + |11&gt;) / sqrt(2)</text>
    <path d="M 76 118 C 95 88 113 88 105 118 C 97 148 124 148 136 118 C 150 88 165 88 165 118" fill="none" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
  </g>

  <path d="M 360 288 C 420 230 445 230 492 288" fill="none" stroke="#7c3aed" stroke-width="5" stroke-dasharray="10 12"/>
  <path d="M 610 288 C 675 230 705 230 740 288" fill="none" stroke="#7c3aed" stroke-width="5" stroke-dasharray="10 12"/>

  <g transform="translate(155 445)">
    <rect width="790" height="68" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="395" y="29" text-anchor="middle" class="small">Same-basis measurements are strongly correlated.</text>
    <text x="395" y="53" text-anchor="middle" class="small">The correlations are real, but they do not transmit a message faster than light.</text>
  </g>
</svg>
